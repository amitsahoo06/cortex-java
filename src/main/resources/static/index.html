<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CortexON UI</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-4">CortexON</h1>
                <div class="card">
                    <div class="card-header">
                        <h5>Task Input</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label for="taskInput" class="form-label">Enter your task:</label>
                            <textarea class="form-control" id="taskInput" rows="3" placeholder="Describe your task here..."></textarea>
                        </div>
                        <button id="submitTask" class="btn btn-primary">Submit Task</button>
                        <button id="connectWs" class="btn btn-secondary">Connect WebSocket</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5>Agent Responses</h5>
                    </div>
                    <div class="card-body">
                        <div id="responseContainer" class="response-container">
                            <div class="text-center text-muted">
                                <p>Submit a task to see responses here</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
