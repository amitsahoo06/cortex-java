# Server Configuration
server.port=12000
server.address=0.0.0.0
server.servlet.context-path=/api

# Logging Configuration
logging.level.root=INFO
logging.level.com.cortexon=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# AI Model Configuration
ai.model.anthropic.api-key=${ANTHROPIC_API_KEY:your-api-key}
ai.model.anthropic.model-name=${ANTHROPIC_MODEL_NAME:claude-3-opus-20240229}
ai.model.openai.api-key=${OPENAI_API_KEY:your-api-key}
ai.model.openai.model-name=${OPENAI_MODEL_NAME:gpt-4o}

# CORS Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true